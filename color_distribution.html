<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Art Palette Explorer</title>
    <style>
      :root {
        --bg: #f8f3e9;
        --card: #fffaf0;
        --ink: #1f1a14;
        --muted: #6d6358;
        --stroke: #d8cfc1;
        --accent: #af5d2b;
        --accent-2: #2f6f78;
        --shadow: 0 24px 40px rgba(35, 23, 8, 0.14);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 14% 20%,
            rgba(175, 93, 43, 0.2) 0%,
            rgba(175, 93, 43, 0) 45%
          ),
          radial-gradient(
            circle at 85% 12%,
            rgba(47, 111, 120, 0.22) 0%,
            rgba(47, 111, 120, 0) 42%
          ),
          linear-gradient(145deg, #f9f5ea 0%, #efe5d4 45%, #f4ecdd 100%);
      }

      .app-shell {
        width: min(1220px, calc(100% - 32px));
        margin: 20px auto 40px;
      }

      .topbar {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        justify-content: space-between;
        padding: 16px 18px;
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        background: rgba(255, 248, 236, 0.82);
        backdrop-filter: blur(8px);
        box-shadow: var(--shadow);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .eyebrow {
        margin: 0;
        font-size: 0.74rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2.2vw, 2.25rem);
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .btn,
      .file-label {
        border: 1px solid var(--stroke);
        background: #fff8ec;
        color: var(--ink);
        border-radius: 999px;
        font-size: 0.86rem;
        font-weight: 600;
        padding: 10px 14px;
        cursor: pointer;
        transition:
          transform 160ms ease,
          background-color 160ms ease,
          border-color 160ms ease;
      }

      .btn:hover,
      .file-label:hover {
        transform: translateY(-1px);
        border-color: #bca88f;
        background: #fff2de;
      }

      .btn-primary {
        background: linear-gradient(120deg, #bc6a37 0%, #a64d27 100%);
        color: #fff8eb;
        border-color: #985226;
      }

      .btn-primary:hover {
        background: linear-gradient(120deg, #c77744 0%, #ae552d 100%);
      }

      #uploadInput {
        display: none;
      }

      .stage {
        margin-top: 18px;
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        background: var(--card);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .main-grid {
        display: grid;
        grid-template-columns: 1.45fr 1fr;
        min-height: 520px;
      }

      .image-panel {
        position: relative;
        border-right: 1px solid var(--stroke);
        overflow: hidden;
      }

      .hero-image {
        width: 100%;
        height: 100%;
        min-height: 520px;
        object-fit: cover;
        display: block;
        transform: scale(1.02);
        transition: opacity 220ms ease;
      }

      .image-overlay {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 18px;
        color: #fff8ec;
        background: linear-gradient(
          to top,
          rgba(19, 16, 12, 0.82),
          rgba(19, 16, 12, 0)
        );
      }

      .image-title {
        margin: 0;
        font-size: 1.08rem;
        font-weight: 700;
        max-width: 90%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .image-subtitle {
        margin: 6px 0 0;
        font-size: 0.82rem;
        opacity: 0.86;
      }

      .palette-panel {
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        background: linear-gradient(180deg, #fff9ee 0%, #f7ecdc 100%);
      }

      .panel-title {
        margin: 0;
        font-size: 0.76rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .palette-list {
        display: flex;
        flex-direction: column;
        gap: 9px;
      }

      .palette-row {
        display: grid;
        grid-template-columns: 56px minmax(120px, 1fr) auto;
        gap: 10px;
        align-items: center;
        border: 1px solid rgba(162, 132, 101, 0.2);
        border-radius: 12px;
        padding: 7px;
        background: rgba(255, 249, 236, 0.65);
        cursor: pointer;
        transition:
          border-color 140ms ease,
          transform 140ms ease;
      }

      .palette-row:hover {
        border-color: rgba(118, 89, 55, 0.5);
        transform: translateY(-1px);
      }

      .swatch {
        height: 32px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
      }

      .bar-wrap {
        height: 8px;
        border-radius: 999px;
        background: rgba(119, 91, 59, 0.14);
        overflow: hidden;
      }

      .bar {
        height: 100%;
        border-radius: inherit;
        transition: width 220ms ease;
      }

      .hex {
        font-size: 0.8rem;
        font-weight: 700;
        color: #5c4f42;
        letter-spacing: 0.03em;
      }

      .palette-strip {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        margin-top: 2px;
        height: 32px;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .meta-card {
        border: 1px solid rgba(156, 129, 101, 0.3);
        border-radius: 10px;
        background: rgba(255, 250, 241, 0.74);
        padding: 8px;
      }

      .meta-label {
        font-size: 0.68rem;
        text-transform: uppercase;
        color: var(--muted);
        letter-spacing: 0.08em;
        margin: 0;
      }

      .meta-value {
        margin: 4px 0 0;
        font-size: 0.92rem;
        font-weight: 700;
      }

      .filmstrip {
        border-top: 1px solid var(--stroke);
        background: #f7e9d5;
        padding: 14px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px;
        max-height: 265px;
        overflow-y: auto;
      }

      .thumb {
        border: 1px solid rgba(125, 97, 66, 0.3);
        border-radius: 12px;
        overflow: hidden;
        background: #fff6e8;
        cursor: pointer;
        transition:
          transform 150ms ease,
          border-color 150ms ease;
      }

      .thumb:hover {
        transform: translateY(-2px);
        border-color: rgba(82, 132, 141, 0.8);
      }

      .thumb.active {
        border-color: var(--accent-2);
        box-shadow: inset 0 0 0 1px rgba(47, 111, 120, 0.45);
      }

      .thumb img {
        width: 100%;
        height: 86px;
        object-fit: cover;
        display: block;
      }

      .thumb-name {
        margin: 0;
        padding: 8px 8px 7px;
        font-size: 0.73rem;
        line-height: 1.25;
        color: #584c3f;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      @media (max-width: 960px) {
        .main-grid {
          grid-template-columns: 1fr;
        }

        .image-panel {
          border-right: none;
          border-bottom: 1px solid var(--stroke);
        }

        .hero-image {
          min-height: 320px;
          max-height: 420px;
        }

        .meta-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Visual Color Explorer</p>
          <h1>Art Palette Explorer</h1>
        </div>
        <div class="actions">
          <label class="file-label" for="uploadInput">Subir imagen</label>
          <input id="uploadInput" type="file" accept="image/*" />
          <button id="randomBtn" class="btn" type="button">
            Imagen aleatoria
          </button>
          <button id="copyBtn" class="btn btn-primary" type="button">
            Copiar paleta
          </button>
        </div>
      </header>

      <section class="stage">
        <div class="main-grid">
          <div class="image-panel">
            <img id="heroImage" class="hero-image" alt="Imagen seleccionada" />
            <div class="image-overlay">
              <p id="imageTitle" class="image-title"></p>
              <p id="imageSubtitle" class="image-subtitle"></p>
            </div>
          </div>

          <aside class="palette-panel">
            <p class="panel-title">Paleta activa</p>
            <div id="paletteStrip" class="palette-strip"></div>
            <div id="paletteList" class="palette-list"></div>
            <div class="meta-grid">
              <article class="meta-card">
                <p class="meta-label">Dominante</p>
                <p id="dominantHex" class="meta-value">-</p>
              </article>
              <article class="meta-card">
                <p class="meta-label">Temperatura</p>
                <p id="temperature" class="meta-value">-</p>
              </article>
              <article class="meta-card">
                <p class="meta-label">Luminosidad</p>
                <p id="brightness" class="meta-value">-</p>
              </article>
            </div>
          </aside>
        </div>
        <div id="filmstrip" class="filmstrip"></div>
      </section>
    </div>

      const heroImage = document.getElementById("heroImage");

      let customEntry = null;
      let activeIndex = 0;

      const library = imageData
        .filter(
          (item) => item && Array.isArray(item.palette) && item.palette.length,
        )
        .map((item) => ({
          filename: item.filename,
          path: item.path,
          dominant_color: item.dominant_color || item.palette[0],
          palette: item.palette.slice(0, 5),
        }));

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function toHex(rgb) {
        return (
          "#" +
          rgb
            .map((n) => clamp(n, 0, 255).toString(16).padStart(2, "0"))
            .join("")
            .toUpperCase()
        );
      }

      function toRgbString(rgb) {
        return "rgb(" + rgb[0] + ", " + rgb[1] + ", " + rgb[2] + ")";
      }

      function luminance(rgb) {
        return Math.round(
          (0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2]) / 2.55,
        );
      }

      function tempLabel(rgb) {
        const warm = rgb[0] - rgb[2];
        if (warm > 28) return "Calida";
        if (warm < -28) return "Fria";
        return "Neutra";
      }

      function currentItem() {
        return customEntry || library[activeIndex];
      }

      function colorDistance(a, b) {
        const d0 = a[0] - b[0];
        const d1 = a[1] - b[1];
        const d2 = a[2] - b[2];
        return d0 * d0 + d1 * d1 + d2 * d2;
      }

      function paletteSimilarityScore(basePalette, candidatePalette) {
        return basePalette.reduce((sum, baseColor) => {
          const closest = candidatePalette.reduce((best, color) => {
            return Math.min(best, colorDistance(baseColor, color));
          }, Number.POSITIVE_INFINITY);
          return sum + closest;
        }, 0);
      }

      function rankedLibraryByCurrentPalette(basePalette) {
        return library
          .map((item, idx) => ({
            item,
            idx,
            score: paletteSimilarityScore(basePalette, item.palette),
          }))
          .sort((a, b) => a.score - b.score);
      }

      function closestImageByColor(target) {
        let best = 0;
        let bestScore = Number.POSITIVE_INFINITY;

        library.forEach((item, idx) => {
          const score = item.palette.reduce((sum, color) => {
            return Math.min(sum, colorDistance(color, target));
          }, Number.POSITIVE_INFINITY);

          if (score < bestScore) {
            bestScore = score;
            best = idx;
          }
        });

        return best;
      }

      function estimateWeights(palette) {
        const base = [40, 22, 16, 12, 10];
        return palette.map((_, i) => base[i] || 8);
      }

      function renderFilmstrip() {
        filmstrip.innerHTML = "";

        const item = currentItem();
        if (!item) return;

        const ranked = rankedLibraryByCurrentPalette(item.palette);

        ranked.forEach(({ item: rankedItem, idx: sourceIndex }) => {
          const card = document.createElement("button");
          card.className =
            "thumb" +
            (sourceIndex === activeIndex && !customEntry ? " active" : "");
          card.type = "button";
          card.title = rankedItem.filename;
          card.innerHTML =
            '<img src="' +
            rankedItem.path +
            '" alt="' +
            rankedItem.filename +
            '">' +
            '<p class="thumb-name">' +
            rankedItem.filename +
            "</p>";
          card.addEventListener("click", () => {
            customEntry = null;
            activeIndex = sourceIndex;
            render();
          });
          filmstrip.appendChild(card);
        });
      }

      function renderPalette(item) {
        paletteStrip.innerHTML = "";
        paletteList.innerHTML = "";
        const weights = estimateWeights(item.palette);

        item.palette.forEach((color, idx) => {
          const hex = toHex(color);

          const stripCell = document.createElement("div");
          stripCell.className = "swatch";
          stripCell.style.background = toRgbString(color);
          stripCell.title = hex;
          paletteStrip.appendChild(stripCell);

          const row = document.createElement("button");
          row.className = "palette-row";
          row.type = "button";
          row.title = "Buscar imagen similar por color";

          const swatch = document.createElement("div");
          swatch.className = "swatch";
          swatch.style.background = toRgbString(color);

          const barWrap = document.createElement("div");
          barWrap.className = "bar-wrap";
          const bar = document.createElement("div");
          bar.className = "bar";
          bar.style.width = weights[idx] + "%";
          bar.style.background = toRgbString(color);
          barWrap.appendChild(bar);

          const hexLabel = document.createElement("span");
          hexLabel.className = "hex";
          hexLabel.textContent = hex;

          row.appendChild(swatch);
          row.appendChild(barWrap);
          row.appendChild(hexLabel);

          row.addEventListener("click", () => {
            if (customEntry) {
              const jump = closestImageByColor(color);
              customEntry = null;
              activeIndex = jump;
              render();
              return;
            }

            activeIndex = closestImageByColor(color);
            render();
          });

          paletteList.appendChild(row);
        });
      }

      function render() {
        const item = currentItem();
        if (!item) return;

        heroImage.style.opacity = "0.6";
        heroImage.onload = () => {
          heroImage.style.opacity = "1";
        };
        heroImage.src = item.path;
        heroImage.alt = item.filename;
        imageTitle.textContent = item.filename;
        imageSubtitle.textContent = customEntry
          ? "Imagen subida por el usuario"
          : "Coleccion local";

        renderPalette(item);

        const dom = item.dominant_color || item.palette[0];
        dominantHex.textContent = toHex(dom);
        temperature.textContent = tempLabel(dom);
        brightness.textContent = luminance(dom) + "%";
        renderFilmstrip();
      }

      function quantizeColors(pixels, k) {
        const centers = [];
        const step = Math.max(1, Math.floor(pixels.length / k));

        for (let i = 0; i < k; i++) {
          const p = pixels[i * step] || pixels[0];
          centers.push([p[0], p[1], p[2]]);
        }

        for (let iter = 0; iter < 8; iter++) {
          const buckets = Array.from({ length: k }, () => ({
            sum: [0, 0, 0],
            count: 0,
          }));

          for (const p of pixels) {
            let best = 0;
            let bestDist = Number.POSITIVE_INFINITY;

            for (let i = 0; i < k; i++) {
              const c = centers[i];
              const d0 = p[0] - c[0];
              const d1 = p[1] - c[1];
              const d2 = p[2] - c[2];
              const dist = d0 * d0 + d1 * d1 + d2 * d2;
              if (dist < bestDist) {
                bestDist = dist;
                best = i;
              }
            }

            buckets[best].sum[0] += p[0];
            buckets[best].sum[1] += p[1];
            buckets[best].sum[2] += p[2];
            buckets[best].count += 1;
          }

          buckets.forEach((bucket, i) => {
            if (!bucket.count) return;
            centers[i] = [
              Math.round(bucket.sum[0] / bucket.count),
              Math.round(bucket.sum[1] / bucket.count),
              Math.round(bucket.sum[2] / bucket.count),
            ];
          });
        }

        return centers;
      }

      function extractPaletteFromImage(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = "anonymous";

          img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            if (!ctx) {
              reject(new Error("No se pudo leer el contexto del canvas"));
              return;
            }

            const targetW = 200;
            const scale = targetW / img.width;
            canvas.width = targetW;
            canvas.height = Math.max(120, Math.round(img.height * scale));
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            const { data } = ctx.getImageData(
              0,
              0,
              canvas.width,
              canvas.height,
            );
            const pixels = [];

            for (let i = 0; i < data.length; i += 16) {
              const alpha = data[i + 3];
              if (alpha < 200) continue;
              pixels.push([data[i], data[i + 1], data[i + 2]]);
            }

            if (!pixels.length) {
              reject(new Error("No se detectaron pixeles validos"));
              return;
            }

            const palette = quantizeColors(pixels, 5).sort(
              (a, b) => luminance(b) - luminance(a),
            );
            resolve(palette);
          };

          img.onerror = () => reject(new Error("No se pudo cargar la imagen"));
          img.src = url;
        });
      }

      uploadInput.addEventListener("change", async (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const objectUrl = URL.createObjectURL(file);
        try {
          const palette = await extractPaletteFromImage(objectUrl);
          customEntry = {
            filename: file.name,
            path: objectUrl,
            dominant_color: palette[0],
            palette,
          };
          render();
        } catch (err) {
          alert("No fue posible extraer la paleta de esta imagen.");
          URL.revokeObjectURL(objectUrl);
        }
      });

      randomBtn.addEventListener("click", () => {
        customEntry = null;
        activeIndex = Math.floor(Math.random() * library.length);
        render();
      });

      copyBtn.addEventListener("click", async () => {
        const item = currentItem();
        if (!item || !navigator.clipboard) return;

        const output = item.palette.map((color) => toHex(color)).join(" ");
        try {
          await navigator.clipboard.writeText(output);
          copyBtn.textContent = "Paleta copiada";
          setTimeout(() => {
            copyBtn.textContent = "Copiar paleta";
          }, 1200);
        } catch (_error) {
          copyBtn.textContent = "No disponible";
          setTimeout(() => {
            copyBtn.textContent = "Copiar paleta";
          }, 1200);
        }
      });

      render();
